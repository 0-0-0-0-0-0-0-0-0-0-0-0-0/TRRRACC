<head>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        secondary: '#8b5cf6',
                        dark: {
                            900: '#0f0f23',

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .gradient-text {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .gradient-border {
            position: relative;
        }
        .gradient-border::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 1px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6, #a855f7);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
        }
        .pulse-dot {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .report-pre {
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
        }
        /* 页面遮罩过渡 */
        .page-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 100%);
            z-index: 9999;
            pointer-events: none;
        }
        .overlay-enter {
            animation: overlayIn 0.1s ease-out forwards;
        }
        .overlay-exit {
            animation: overlayOut 0.15s ease-out forwards;
        }
        @keyframes overlayIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes overlayOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
        /* 下拉菜单动画 */
        .mobile-menu-enter {
            animation: slideDown 0.25s ease-out;
        }
        .mobile-menu-exit {
            animation: slideUp 0.2s ease-out forwards;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideUp {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-10px); }
        }
    </style>
</head>

    <script src="/assets/i18n.js"></script>
    <script>
        let currentTaskId = null;
        let pollInterval = null;

        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.classList.remove('hidden');
            setTimeout(() => {
                errorEl.classList.add('hidden');
            }, 5000);
        }

        async function startQuery() {
            const market = document.getElementById('market').value.trim();
            const address = document.getElementById('address').value.trim();

            if (!market) {
                showError(t('error_no_market'));
                return;
            }
            if (!address || !address.startsWith('0x') || address.length !== 42) {
                showError(t('error_invalid_wallet'));
                return;
            }

            // 显示进度，隐藏结果
            document.getElementById('resultSection').classList.add('hidden');
            document.getElementById('progressSection').classList.remove('hidden');
            document.getElementById('queryBtn').disabled = true;
            document.getElementById('cancelBtn').classList.remove('hidden');
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('progressPercent').textContent = '0%';
            document.getElementById('progressText').textContent = t('simple_progress_fetching');

            try {
                const response = await fetch('/api/query', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({market, address, lang: getLang()})
                });

                const data = await response.json();

                if (data.error) {
                    showError(data.error);
                    resetUI();
                    return;
                }

                currentTaskId = data.task_id;
                pollStatus();

            } catch (e) {
                showError(t('error_fetch_failed') + ': ' + e.message);
                resetUI();
            }
        }

        function pollStatus() {
            pollInterval = setInterval(async () => {
                if (!currentTaskId) {
                    clearInterval(pollInterval);
                    return;
                }

                try {
                    const response = await fetch(`/api/status/${currentTaskId}`);
                    const data = await response.json();

                    const percent = data.percent || 0;
                    document.getElementById('progressFill').style.width = percent + '%';
                    document.getElementById('progressPercent').textContent = percent + '%';

                    if (percent > 0) {
                        document.getElementById('progressText').textContent = t('simple_progress_analyzing');
                    }

                    if (data.status === 'completed') {
                        clearInterval(pollInterval);
                        showResult(data.result);
                    } else if (data.status === 'error' || data.status === 'cancelled') {
                        clearInterval(pollInterval);
                        showError(data.error || t('error_fetch_failed'));
                        resetUI();
                    }

                } catch (e) {
                    console.error('Poll status failed:', e);
                }
            }, 1000);
        }

        async function cancelQuery() {
            if (!currentTaskId) return;

            try {
                await fetch(`/api/cancel/${currentTaskId}`, {method: 'POST'});
                clearInterval(pollInterval);
                currentTaskId = null;
                resetUI();
            } catch (e) {
                console.error('取消失败:', e);
            }
        }

        function showResult(result) {
            document.getElementById('progressSection').classList.add('hidden');
            document.getElementById('resultSection').classList.remove('hidden');
            document.getElementById('queryBtn').disabled = false;
            document.getElementById('cancelBtn').classList.add('hidden');

            // 显示报告内容
            if (result.report_content) {
                document.getElementById('reportContent').textContent = result.report_content;
            }

            // 解析报告并显示各区块
            if (result.report_content) {
                parseAndShowFullReport(result.report_content);
            }

            // 下载按钮
            renderDownloadButtons(result);
        }

        function parseAndShowFullReport(content) {
            // 检测报告语言
            const isEnReport = content.includes('Wallet Address:') || content.includes('Trade Count:');
            
            // 提取基础数据 (双语支持)
            const username = content.match(/(?:用户名|Username): (.+)/)?.[1] || (isEnReport ? 'Unknown' : '未知');
            const walletFull = content.match(/(?:钱包地址|Wallet Address): (0x[a-fA-F0-9]+)/)?.[1] || '';
            const walletShort = walletFull ? `${walletFull.slice(0,8)}...${walletFull.slice(-6)}` : '';
            const marketName = content.match(/(?:市场|Market): (.+)/)?.[1] || '';
            const timeRange = content.match(/(?:时间范围|Time Range): (.+)/)?.[1] || '';

            const btnClass = 'px-6 py-3 bg-dark-700 rounded-xl hover:bg-dark-600 transition-colors flex items-center gap-2';
            const icon = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>';
            const chartLabel = t('simple_download_chart');
            const reportLabel = t('simple_download_report');
            const dataLabel = t('simple_download_data');
            
            let html = '';
            if (result.chart) {
                html += `<a href="/static/${currentTaskId}/${result.chart}" download class="${btnClass}">${icon} ${chartLabel} (PNG)</a>`;
            }
            if (result.report) {
                html += `<a href="/static/${currentTaskId}/${result.report}" download class="${btnClass}">${icon} ${reportLabel} (TXT)</a>`;
            }
            if (result.trades) {
                html += `<a href="/static/${currentTaskId}/${result.trades}" download class="${btnClass}">${icon} ${dataLabel} (JSON)</a>`;
            }
            downloadEl.innerHTML = html;
        }

        function resetUI() {
            document.getElementById('progressSection').classList.add('hidden');
            document.getElementById('queryBtn').disabled = false;
            document.getElementById('cancelBtn').classList.add('hidden');
            currentTaskId = null;
        }

        let reportExpanded = false;
        function toggleReport() {
            const container = document.getElementById('reportContainer');
            const toggleText = document.getElementById('reportToggleText');
            const toggleIcon = document.getElementById('reportToggleIcon');
            
            reportExpanded = !reportExpanded;
            
            if (reportExpanded) {
                container.classList.remove('hidden');
                toggleText.textContent = t('result_collapse');
                toggleIcon.style.transform = 'rotate(180deg)';
            } else {
                container.classList.add('hidden');
                toggleText.textContent = t('result_expand');
                toggleIcon.style.transform = 'rotate(0deg)';
            }
        }


        function toggleMobileMenu() {
            const menu = document.getElementById('mobileMenu');
            if (menu.classList.contains('hidden')) {
                menu.classList.remove('hidden', 'mobile-menu-exit');
                menu.classList.add('mobile-menu-enter');
            } else {
                menu.classList.remove('mobile-menu-enter');
                menu.classList.add('mobile-menu-exit');
                setTimeout(() => menu.classList.add('hidden'), 200);
            }
        }

        // 复制钱包地址
        function copyAddress() {
            const address = '0x76a9836a22339e71ea6577c5ba0cac3a397d78f7';
            navigator.clipboard.writeText(address).then(() => {
                const copyText = document.getElementById('copyText');
                copyText.textContent = 'Copied!';
                setTimeout(() => {
                    copyText.textContent = 'Copy Address';
                }, 2000);
            });
        }

        // 页面过渡
        function navigateWithTransition(href) {
            const overlay = document.getElementById('pageOverlay');
            overlay.classList.remove('overlay-exit');
            overlay.classList.add('overlay-enter');
            setTimeout(() => { window.location.href = href; }, 100);
        }
        document.querySelectorAll('a[href^="/"]').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                navigateWithTransition(this.getAttribute('href'));
            });
        });
        // 浏览器后退时重置遮罩
        window.addEventListener('pageshow', function(e) {
            if (e.persisted) {
                const overlay = document.getElementById('pageOverlay');
                overlay.classList.remove('overlay-enter');
                overlay.classList.add('overlay-exit');
            }
        });
    </script>
</body>
</html>
